mentById('lagControl');const hasLag=rows.some(row=>Object.prototype.hasOwnProperty.call(row,'lag_hours')&&row.lag_hours!==null);const variables=[...new Set(rows.map(row=>row.variable))].sort();variables.forEach(variable=>{const option=document.createElement('option');option.value=variable;const sample=rows.find(row=>row.variable===variable);option.textContent=sample&&sample.reference_variable?`${variable} vs ${sample.reference_variable}`:variable;variableSelect.appendChild(option);});const map=L.map('map');L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);const layerGroup=L.layerGroup().addTo(map);const coords=rows.filter(row=>row.sensor_lat!==null&&row.sensor_lon!==null);if(coords.length){map.fitBounds(L.latLngBounds(coords.map(row=>[row.sensor_lat,row.sensor_lon])).pad(0.20));}else{map.setView([37.61,-0.99],13);}function refreshLagOptions(variable){if(!hasLag){return;}const lags=[...new Set(rows.filter(row=>row.variable===variable).map(row=>Number(row.lag_hours)).filter(value=>!Number.isNaN(value)))].sort((a,b)=>a-b);lagSelect.innerHTML='';lags.forEach(lag=>{const option=document.createElement('option');option.value=String(lag);option.textContent=`lag_${lag}h`;lagSelect.appendChild(option);});lagControl.style.display=lags.length?'flex':'none';if(lags.length){lagSelect.value=String(lags[0]);}}function currentLag(){if(!hasLag||lagControl.style.display==='none'){return null;}const parsed=Number(lagSelect.value);return Number.isNaN(parsed)?null:parsed;}function render(){const variable=variableSelect.value;const selectedLag=currentLag();layerGroup.clearLayers();rows.filter(row=>row.variable===variable&&(!hasLag||selectedLag===null||Number(row.lag_hours)===selectedLag)).forEach(row=>{const radius=8+Math.max(0,Number(row.significant_moments_pct||0))*0.35;const marker=L.circleMarker([row.sensor_lat,row.sensor_lon],{radius,color:row.map_color||'#64748b',fillColor:row.map_color||'#64748b',fillOpacity:0.7,weight:2});const refLine=row.reference_variable?`<br>Variable de referencia: ${row.reference_variable}`:'';const lagLine=hasLag&&row.lag_hours!==undefined&&row.lag_hours!==null?`<br>Lag: ${row.lag_hours} h`:'';marker.bindPopup(`<strong>${row.variable}</strong>${refLine}${lagLine}<br>Sensor: ${row.sensor_name||row.entity_id}<br>Entity: ${row.entity_id}<br>Patron dominante: ${row.dominant_pattern}<br>% horas significativas: ${row.significant_moments_pct}<br>HH/LL/HL/LH: ${row.HH_moments} / ${row.LL_moments} / ${row.HL_moments} / ${row.LH_moments}<br>% observado: ${row.observed_moments_pct}<br>% horas insuficientes: ${row.insufficient_moments_pct}<br>Horas missing: ${row.missing_moments}<br>Moran local medio: ${row.mean_local_moran_i}<br>% senal global de la variable: ${row.variable_signal_pct}`);marker.addTo(layerGroup);});}variableSelect.addEventListener('change',()=>{refreshLagOptions(variableSelect.value);render();});if(hasLag){lagSelect.addEventListener('change',render);}if(variables.length){variableSelect.value=variables[0];refreshLagOptions(variables[0]);render();}const legend=L.control({position:'bottomright'});legend.onAdd=function(){const div=L.DomUtil.create('div','legend');div.innerHTML='<div><strong>Patron</strong></div><div class="row"><span class="swatch" style="background:#b91c1c"></span> HH</div><div class="row"><span class="swatch" style="background:#1d4ed8"></span> LL</div><div class="row"><span class="swatch" style="background:#ea580c"></span> HL</div><div class="row"><span class="swatch" style="background:#7c3aed"></span> LH</div><div class="row"><span class="swatch" style="background:#0f766e"></span> Mixed</div><div class="row"><span class="swatch" style="background:#64748b"></span> No signal</div>';return div;};legend.addTo(map);</script></body></html>
